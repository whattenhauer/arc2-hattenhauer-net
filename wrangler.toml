name = "arc2-hattenhauer-net"
compatibility_date = "2026-07-12"

compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "arc2d1"
database_id = "9854f268-33fe-44d0-a04a-7e01b1af0d60"

routes = [
  { pattern = "arc2.hattenhauer.net/*", zone_name = "hattenhauer.net" }
]

[assets]
directory = "./assets"

[env.staging]
name = "arc2-hattenhauer-net-staging"
routes = [
  { pattern = "staging.arc2.hattenhauer.net/*", zone_name = "hattenhauer.net" }
]
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[env.staging.assets]
directory = "./assets"
